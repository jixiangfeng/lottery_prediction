# 彩票AI预测系统配置文件
# 用于存放应用程序配置

# 应用信息
app:
  name: "彩票AI预测系统"
  version: "2.0.0"
  author: "KittenCN"

# 路径配置
paths:
  data: "./data"
  model: "./model"
  predict: "./predict"
  logs: "./logs"
  results: "./results"
  data_cache: "./data_cache"

# 网络配置
network:
  timeout: 30
  retry_count: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "lottery_predict.log"

# 模型默认参数
model_defaults:
  batch_size: 32
  red_epochs: 40
  blue_epochs: 20
  windows_size: 5
  learning_rate: 0.0008
  
# 训练配置
training:
  save_epoch_interval: 100
  save_time_interval: 600
  max_memory_usage: 0.8

# GPU配置
gpu:
  enabled: true
  memory_growth: true
  device_id: 0

# 分析增强参数
analysis:
  dirichlet:
    prior_strength: 0.6      # 对称 Dirichlet 先验强度（越大越平滑）
    window_size: 120         # 参与后验更新的滑动窗口长度
    variance_weight: 0.35    # 方差惩罚权重（越大越保守）
  rules:
    min_support: 0.08        # 频繁项集最小支持度阈值
    min_confidence: 0.6      # 关联规则最小置信度
    max_itemset_size: 3      # 关注的最大项集大小
    cache_ttl_seconds: 86400 # 规则缓存有效期（秒）
    soft_penalty_weight: 0.4 # 软模式下的惩罚放大系数
  copula:
    enabled: true            # 是否启用 Copula 采样辅助
    min_draws: 180           # 估计相关矩阵所需的最小期数
    samples: 64              # 每次生成的候选组合数量
    shrinkage: 0.1           # 协方差矩阵收缩强度（0-1）
    topk_multiplier: 1.4     # 采样结果与需求数量的倍率上限
    random_seed: null        # 随机种子；null 表示按运行时间随机
  graph_embedding:
    enabled: true                            # 是否启用图嵌入通道
    embedding_dim: 32                        # 训练脚本生成的嵌入维度
    cache_file: "./data_cache/graph_embeddings.npz" # 嵌入缓存文件路径
    weight: 0.18                             # 在综合得分中的权重
    metric: "norm"                           # 得分方式：norm / cosine_mean
    decay: 0.94                              # 历史数据权重衰减因子（训练脚本保持一致）

[flake8]
# 与 .flake8 相同的设置，部分 CI 只读取 setup.cfg
max-line-length = 140
extend-ignore = E203,W503,E202,E231,E261,E266,E271,E302,E303,E305,E306,E402,E501,E711,E712,E721,E722,E731,W291,W293,W391
per-file-ignores =
    src/__init__.py: F403, F405
    src/analysis/kl8_analysis.py: F403, F405, F401
    src/analysis/kl8_analysis_plus.py: F403, F405, F401
    src/analysis/kl8_cash.py: F403, F405, F401
    src/analysis/kl8_cash_plus.py: F403, F405, F401
    src/analysis/kl8_running.py: F403, F405, F401
    src/common.py: F401, F841, F824
    src/modeling.py: F401
    src/pipeline.py: F401
